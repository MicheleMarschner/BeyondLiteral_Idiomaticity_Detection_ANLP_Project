project_name: "SarcasmDetection"
seed: 13

data:
  train_path: data/raw/train.csv
  dev_path: data/raw/dev.csv
  text_col: sentence
  label_col: label

output:
  run_dir: runs
  experiment_name: baseline

train:
  epochs: 3
  batch_size: 16
  lr: 2.0e-5
  max_length: 128

model:
  kind: hf        # "hf" or "tfidf"
  hf_name: distilbert-base-multilingual-cased




