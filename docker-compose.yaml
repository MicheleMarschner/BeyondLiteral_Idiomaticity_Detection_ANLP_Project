services:
  train:
    build: .
    volumes:
      - ./data:/app/data:ro
      - ./src/experiments/experiments_template.py:/app/src/experiments/experiments_template.py:ro
      - ./experiments:/app/experiments
      - ./results:/app/results
    command: ["python", "-m", "src.main", "train", "/app/src/experiments/experiments_template.py"]

  eval:
    build: .
    volumes:
      - ./data:/app/data:ro
      - ./experiments:/app/experiments
      - ./results:/app/results
    environment:
      EXPERIMENTS_URL: "https://drive.google.com/file/d/1rwKbbOPYdG6T8DcFCTzoPhzoZVyy0JtL/view?usp=sharing"
    command: ["/usr/local/bin/download_experiments.sh", "python", "-m", "src.main", "evaluate"]

  analyse:
    build: .
    volumes:
      - ./data:/app/data
      - ./experiments:/app/experiments
      - ./results:/app/results
    environment:
      EXPERIMENTS_URL: "https://drive.google.com/file/d/1rwKbbOPYdG6T8DcFCTzoPhzoZVyy0JtL/view?usp=sharing"
    command: ["/usr/local/bin/download_experiments.sh", "python", "-m", "src.main", "analyse"]